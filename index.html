<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요 👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 2rem; color: #333; margin-bottom: 10px; }
    p { color: #666; line-height: 1.7; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 4px;
    }
    .footer { margin-top: 30px; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🌟</div>
    <h1>안녕하세요!</h1>
    <p>저의 첫 번째 웹사이트에 방문해 주셔서 감사합니다.<br>앞으로 멋진 것들을 함께 만들어 갈 예정입니다.</p>
    <p>
      <span class="badge">HTML</span>
      <span class="badge">CSS</span>
      <span class="badge">GitHub Pages</span>
    </p>
    <div class="footer">© 2026 Winter-Haeum · GitHub Pages로 배포</div>
  </div>
</body>
</html>
